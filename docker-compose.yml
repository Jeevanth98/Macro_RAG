# docker-compose.yml
version: '3.8'

services:
  neo4j:
    image: neo4j:5
    container_name: neo4j_macro_rag
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password} # Default password is 'password'
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: economic_graphrag_app
    depends_on:
      - neo4j
    ports:
      - "8501:8501" # Streamlit default port
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
    volumes:
      - ./economic_graphrag:/app/economic_graphrag
      - ./data:/app/data
    command: streamlit run economic_graphrag/ui/streamlit_app.py

volumes:
  neo4j_data:
    driver: local
